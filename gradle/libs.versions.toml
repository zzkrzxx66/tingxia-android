[versions]
agp = "8.7.3"
kotlin = "2.0.21"
hilt = "2.52"
ksp = "2.3.10"
compose-bom = "2024.10.01"
core = "1.15.0"
lifecycle = "2.8.7"
activity = "1.9.3"
navigation = "2.8.4"
hilt-navigation = "1.2.0"
room = "2.6.1"

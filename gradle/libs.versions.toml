coil = "2.7.0"
junit = "4.13.2"
androidx-test-junit = "1.2.1"
androidx-test-runner = "1.6.2"

[libraries]
compose-bom = { module = "androidx.compose:compose-bom", version.ref = "compose-bom" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "core" }

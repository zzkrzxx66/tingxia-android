name: Android Release

on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.TINGXIA_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tingxia-release.jks"

      - name: Build signed APK and AAB
        env:
          TINGXIA_RELEASE_STORE_FILE: ${{ runner.temp }}/tingxia-release.jks
          TINGXIA_RELEASE_STORE_PASSWORD: ${{ secrets.TINGXIA_RELEASE_STORE_PASSWORD }}
          TINGXIA_RELEASE_KEY_ALIAS: ${{ secrets.TINGXIA_RELEASE_KEY_ALIAS }}
          TINGXIA_RELEASE_KEY_PASSWORD: ${{ secrets.TINGXIA_RELEASE_KEY_PASSWORD }}
        run: ./gradlew testReleaseUnitTest lintRelease assembleRelease bundleRelease --stacktrace

      - name: Verify and package artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk release-artifacts/tingxia-${GITHUB_REF_NAME#v}.apk
          cp app/build/outputs/bundle/release/app-release.aab release-artifacts/tingxia-${GITHUB_REF_NAME#v}.aab
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs release-artifacts/*.apk
          sha256sum release-artifacts/* > release-artifacts/SHA256SUMS.txt

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tingxia-${{ github.ref_name }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --generate-notes --title "听匣 $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" release-artifacts/* --clobber

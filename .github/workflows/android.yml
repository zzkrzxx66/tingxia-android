name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Verify release R8 build
        run: ./gradlew assembleRelease --stacktrace

      - name: APK fingerprint
        run: |
          set -e
          APK=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          echo "APK=$APK"
          sha256sum "$APK" | tee app/build/outputs/apk/debug/SHA256SUMS.txt
          # v2/v3 signed APKs are not jars — use apksigner
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --print-certs "$APK" | tee -a app/build/outputs/apk/debug/SHA256SUMS.txt
          # Fail if fixed debug keystore missing (would mean random local debug key)
          test -f keystore/tingxia-debug.jks

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: tingxia-debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/SHA256SUMS.txt
          if-no-files-found: error

  # Optional: Room migration instrumentation when emulator is available
  migration-test:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 35]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Run migration instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest --stacktrace
